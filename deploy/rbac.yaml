apiVersion: v1
kind: Namespace
metadata:
  name: epochd

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: epochd-controller
  namespace: epochd

---
# The controller only needs read access to pods in order to resolve label
# selectors and discover which node each container lives on.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: epochd-controller
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: epochd-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: epochd-controller
subjects:
  - kind: ServiceAccount
    name: epochd-controller
    namespace: epochd
