name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test (root module)
        run: go test ./... -count=1 -timeout=5m -coverprofile=coverage-root.out -covermode=atomic

      - name: Test (pkg/faketime module)
        working-directory: pkg/faketime
        run: go test ./... -count=1 -timeout=5m -coverprofile=coverage-faketime.out -covermode=atomic

      - name: Coverage summary
        run: |
          {
            echo "## Test coverage"
            echo ""
            echo "### Root module"
            echo '```'
            go tool cover -func=coverage-root.out
            echo '```'
            echo ""
            echo "### pkg/faketime"
            echo '```'
            (cd pkg/faketime && go tool cover -func=coverage-faketime.out)
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            coverage-root.out
            pkg/faketime/coverage-faketime.out

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          install-mode: goinstall
          args: --timeout=5m

  coverage-pages:
    name: Coverage pages
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/download-artifact@v4
        with:
          name: coverage

      - name: Build pages
        run: |
          mkdir -p pages/coverage

          # Preserve the existing docs site at the root.
          cp -r docs/. pages/

          # Per-module HTML coverage reports.
          go tool cover -html=coverage-root.out -o pages/coverage/root.html
          # pkg/faketime is a separate module; go tool cover must run inside it.
          (cd pkg/faketime && go tool cover -html=coverage-faketime.out -o ../../pages/coverage/faketime.html)

          # Extract total coverage percentage for the badge.
          pct=$(go tool cover -func=coverage-root.out | awk '/^total:/{gsub(/%/,""); print $3}')
          pct_int="${pct%.*}"
          if [ "${pct_int}" -ge 80 ]; then color="#44cc11"
          elif [ "${pct_int}" -ge 60 ]; then color="#dfb317"
          else color="#e05d44"
          fi

          # Write SVG badge (flat style, no external font service needed).
          cat > pages/coverage/badge.svg << SVGEOF
          <svg xmlns="http://www.w3.org/2000/svg" width="128" height="20" role="img" aria-label="coverage: ${pct}%">
            <title>coverage: ${pct}%</title>
            <linearGradient id="s" x2="0" y2="100%">
              <stop offset="0" stop-color="#bbb" stop-opacity=".1"/>
              <stop offset="1" stop-opacity=".1"/>
            </linearGradient>
            <clipPath id="r">
              <rect width="128" height="20" rx="3" fill="#fff"/>
            </clipPath>
            <g clip-path="url(#r)">
              <rect width="68" height="20" fill="#555"/>
              <rect x="68" width="60" height="20" fill="${color}"/>
              <rect width="128" height="20" fill="url(#s)"/>
            </g>
            <g fill="#fff" text-anchor="middle" font-family="DejaVu Sans,Verdana,Geneva,sans-serif" font-size="11">
              <text x="34" y="15" fill="#010101" fill-opacity=".3">coverage</text>
              <text x="34" y="14">coverage</text>
              <text x="98" y="15" fill="#010101" fill-opacity=".3">${pct}%</text>
              <text x="98" y="14">${pct}%</text>
            </g>
          </svg>
          SVGEOF

          # Index page for the /coverage/ sub-path.
          cat > pages/coverage/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width,initial-scale=1">
            <title>epochd — test coverage</title>
            <style>
              body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 0 16px; }
              a { color: #0366d6; }
            </style>
          </head>
          <body>
            <h1>Test coverage</h1>
            <ul>
              <li><a href="root.html">Root module (github.com/bkaznowski/epochd)</a></li>
              <li><a href="faketime.html">pkg/faketime (github.com/bkaznowski/epochd/pkg/faketime)</a></li>
            </ul>
            <p><a href="../">← Back to docs</a></p>
          </body>
          </html>
          HTMLEOF

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: pages

      - id: deploy
        uses: actions/deploy-pages@v4

  build-images:
    name: Build images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build agent image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.agent
          platforms: linux/amd64
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ghcr.io/${{ github.repository_owner }}/epochd-agent:latest,ghcr.io/${{ github.repository_owner }}/epochd-agent:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build controller image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.controller
          platforms: linux/amd64
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ghcr.io/${{ github.repository_owner }}/epochd-controller:latest,ghcr.io/${{ github.repository_owner }}/epochd-controller:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
